version: "3.9"

services:
  db:
    image: postgres:15
    container_name: openwhen-db
    environment:
      POSTGRES_USER: openwhen
      POSTGRES_PASSWORD: openwhen_dev
      POSTGRES_DB: openwhen
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openwhen"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: openwhen-backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://openwhen:openwhen_dev@db:5432/openwhen
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
